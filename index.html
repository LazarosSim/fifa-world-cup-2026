        // Elegant Swiss Watch Chronometer Counter (Athens Time context)
        function setupCountdown() {
            const kickoffDate = new Date("June 11, 2026 22:00:00 GMT+0300").getTime();
            
            function updateCounter() {
                const now = new Date().getTime();
                const distance = kickoffDate - now;

                if (distance < 0) {
                    document.getElementById("countdown-grid").innerHTML = `
                        <div class="col-span-4 bg-luxury-goldLight border border-luxury-gold text-luxury-navy font-bold p-3 rounded-lg text-center tracking-widest text-[11px] serif-sub">

                    `;
                    document.getElementById("kickoff-desc").innerText = "Match schedule synchronizing in real time.";
                    return;
                }

                const days = Math.floor(distance / (1000 * 60 * 60 * 24));
                const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((distance % (1000 * 60)) / 1000);

                document.getElementById("cnt-days").innerText = String(days).padStart(2, '0');
                document.getElementById("cnt-hours").innerText = String(hours).padStart(2, '0');
                document.getElementById("cnt-mins").innerText = String(minutes).padStart(2, '0');
                document.getElementById("cnt-secs").innerText = String(seconds).padStart(2, '0');
            }

            updateCounter();
            setInterval(updateCounter, 1000);
        }

        // Complete Standings Calculation Logic
        function recalculateStandings() {
            groups.forEach(g => {
                g.teams.forEach(t => {
                    t.played = 0;
                    t.won = 0;
                    t.drawn = 0;
                    t.lost = 0;
                    t.goalsFor = 0;
                    t.goalsAgainst = 0;
                    t.points = 0;
                });
            });

            matches.forEach(m => {
                if (m.status === "FT" || m.status === "Live") {
                    const hs = parseInt(m.homeScore);
                    const as = parseInt(m.awayScore);

                    if (!isNaN(hs) && !isNaN(as)) {
                        const groupObj = groups.find(g => g.groupName === m.group);
                        if (groupObj) {
                            const homeTeam = groupObj.teams.find(t => t.team === m.homeTeam);
                            const awayTeam = groupObj.teams.find(t => t.team === m.awayTeam);

                            if (homeTeam && awayTeam) {
                                homeTeam.played += 1;
                                awayTeam.played += 1;

                                homeTeam.goalsFor += hs;
                                homeTeam.goalsAgainst += as;

                                awayTeam.goalsFor += as;
                                awayTeam.goalsAgainst += hs;

                                if (hs > as) {
                                    homeTeam.won += 1;
                                    homeTeam.points += 3;
                                    awayTeam.lost += 1;
                                } else if (hs < as) {
                                    awayTeam.won += 1;
                                    awayTeam.points += 3;
                                    homeTeam.lost += 1;
                                } else {
                                    homeTeam.drawn += 1;
                                    homeTeam.points += 1;
                                    awayTeam.drawn += 1;
                                    awayTeam.points += 1;
                                }
                            }
                        }
                    }
                }
            });
        }

                                        "stream": { "type": "STRING" }
                                    },
                                    "required": ["homeTeam", "awayTeam", "matchDate", "status"]
                                }
                            }
                        },
                        "required": ["tournamentStatus", "matches"]
                    }
                }
            };

            try {
                const result = await callGeminiWithBackoff(payload);
                
                if (result && result.candidates?.[0]?.content?.parts?.[0]?.text) {
                    const parsedData = JSON.parse(result.candidates[0].content.parts[0].text);
                    
                    if (parsedData.matches && parsedData.matches.length > 0) {
                        matches = parsedData.matches.map((apiMatch, index) => {
                            return {
                                id: apiMatch.id || `api-${index}`,
                                homeTeam: apiMatch.homeTeam,
                                homeFlag: apiMatch.homeFlag || getFlagUrl(apiMatch.homeTeam),
                                awayTeam: apiMatch.awayTeam,
                                awayFlag: apiMatch.awayFlag || getFlagUrl(apiMatch.awayTeam),
                                homeScore: apiMatch.homeScore === "" || apiMatch.homeScore === null ? null : parseInt(apiMatch.homeScore),
                                awayScore: apiMatch.awayScore === "" || apiMatch.awayScore === null ? null : parseInt(apiMatch.awayScore),
                                matchDate: apiMatch.matchDate,
                                matchTime: apiMatch.matchTime || "TBD",
                                venue: apiMatch.venue || "Championship Stadium",
                                group: apiMatch.group || "Group Stage",
                                status: apiMatch.status || "Scheduled",
                                minute: apiMatch.minute || null,
                                stream: apiMatch.stream || "FOX Sports"
                            };
                        });

                        recalculateStandings();
                        renderMatches();
                        renderStandings();
                    }

                    badge.className = "flex items-center gap-2 bg-luxury-canvas border-2 border-[#DEDCEA] px-3 py-1.5 rounded-full text-xs text-luxury-emerald";
                    dot.className = "h-2 w-2 rounded-full bg-luxury-emerald pulse-soft";
                    apiStatusTextEl.innerText = "Schedules synchronized";
                } else {
                    throw new Error("Empty query return");
                }
            } catch (err) {
                console.error("Using secure client offline fallback database.", err);
                badge.className = "flex items-center gap-2 bg-luxury-canvas border-2 border-[#DEDCEA] px-3 py-1.5 rounded-full text-xs text-luxury-slate";
                dot.className = "h-2 w-2 rounded-full bg-luxury-gold";
                apiStatusTextEl.innerText = "Offline mode - preserved schedules";
                
                recalculateStandings();
                renderMatches();
                renderStandings();
            }
        }

        async function callGeminiWithBackoff(payload, maxRetries = 5) {
            const apiKey = ""; 
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            
            let delay = 1000;
            for (let i = 0; i < maxRetries; i++) {
                try {
                    const res = await fetch(url, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(payload)
                    });
                    if (!res.ok) throw new Error(`Status: ${res.status}`);
                    return await res.json();
                } catch (err) {
                    if (i === maxRetries - 1) throw err;
                    await new Promise(resolve => setTimeout(resolve, delay));
                    delay *= 2;
                }
            }
        }
